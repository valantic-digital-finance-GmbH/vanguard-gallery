name: Update SAP Roadmap

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout vanguard-gallery
        uses: actions/checkout@v4

      - name: Checkout sap-roadmap-explorer
        uses: actions/checkout@v4
        with:
          repository: valantic-digital-finance-GmbH/sap-roadmap-explorer
          token: ${{ secrets.GH_TOKEN }}
          path: sap-roadmap-explorer

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install beautifulsoup4 lxml

      - name: Integrate roadmap content
        run: python scripts/integrate_roadmap.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/sap-roadmap.html docs/assets/roadmap/
          git diff --staged --quiet || git commit -m "chore: update SAP roadmap $(date +%Y-%m-%d)"
          git push
