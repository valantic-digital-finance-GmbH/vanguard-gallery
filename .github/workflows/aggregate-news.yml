name: Aggregate news

on:
  push:
    branches: [main]
    paths:
      - 'docs/data/news/*.json'

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run aggregation script
        run: python3 scripts/aggregate_news.py

      - name: Commit updated news.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: re-aggregate news data"
          file_pattern: docs/data/news.json
