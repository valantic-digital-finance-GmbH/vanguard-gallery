name: Aggregate use cases

on:
  push:
    branches: [main]
    paths:
      - 'docs/data/usecases/*.json'

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run aggregation script
        run: python3 scripts/aggregate_usecases.py

      - name: Commit updated usecases.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: re-aggregate use case data"
          file_pattern: docs/data/usecases.json
