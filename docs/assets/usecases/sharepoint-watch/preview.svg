<svg viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#0f1e3c"/>

  <!-- Top header bar -->
  <rect x="0" y="0" width="400" height="36" fill="#0c1830"/>
  <rect x="16" y="11" width="80" height="6" rx="2" fill="#0078d4" opacity=".9"/>
  <rect x="104" y="13" width="50" height="3" rx="1.5" fill="#50e6ff" opacity=".35"/>
  <!-- Status dot -->
  <circle cx="360" cy="18" r="5" fill="#57e39e" opacity=".9"/>
  <circle cx="360" cy="18" r="9" fill="#57e39e" opacity=".15"/>

  <!-- ── Storage trend line chart ── -->
  <rect x="16" y="48" width="230" height="130" rx="4" fill="#0c1830" opacity=".8"/>
  <!-- Grid lines -->
  <g stroke="#1e3a6e" stroke-width="1" opacity=".7">
    <line x1="28" y1="80"  x2="234" y2="80"/>
    <line x1="28" y1="106" x2="234" y2="106"/>
    <line x1="28" y1="132" x2="234" y2="132"/>
    <line x1="28" y1="158" x2="234" y2="158"/>
  </g>
  <!-- Y-axis labels -->
  <g font-family="monospace" font-size="7" fill="#50e6ff" opacity=".45" text-anchor="end">
    <text x="60" y="83">4 TB</text>
    <text x="60" y="109">3 TB</text>
    <text x="60" y="135">2 TB</text>
    <text x="60" y="161">1 TB</text>
  </g>
  <!-- Area fill under trend -->
  <path d="M68 158 L88 151 L108 147 L118 143 L128 138 L138 133 L148 126 L158 120 L168 114 L178 110 L188 102 L198 94 L208 88 L218 82 L228 76 L228 165 L68 165 Z"
        fill="#0078d4" opacity=".12"/>
  <!-- Trend line — steady growth with slight acceleration -->
  <polyline points="68,158 88,151 108,147 118,143 128,138 138,133 148,126 158,120 168,114 178,110 188,102 198,94 208,88 218,82 228,76"
            fill="none" stroke="#0078d4" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Anomaly spike -->
  <polyline points="178,110 188,102 198,74 208,88"
            fill="none" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="3 2" stroke-linejoin="round"/>
  <circle cx="198" cy="74" r="5" fill="#ff6b6b"/>
  <circle cx="198" cy="74" r="9" fill="#ff6b6b" opacity=".2"/>
  <!-- Tooltip for anomaly -->
  <rect x="205" y="58" width="52" height="16" rx="3" fill="#ff6b6b" opacity=".9"/>
  <text x="231" y="69" font-family="monospace" font-size="7" fill="#fff" text-anchor="middle">+42 GB spike</text>
  <!-- Chart title -->
  <text x="28" y="62" font-family="monospace" font-size="7" fill="#50e6ff" opacity=".6">TENANT STORAGE TREND</text>

  <!-- ── Per-site bar chart ── -->
  <rect x="16" y="190" width="230" height="90" rx="4" fill="#0c1830" opacity=".8"/>
  <text x="28" y="204" font-family="monospace" font-size="7" fill="#50e6ff" opacity=".6">TOP SITES BY GROWTH</text>
  <!-- Bars -->
  <g rx="1.5">
    <rect x="28"  y="210" width="158" height="9" rx="1.5" fill="#0078d4" opacity=".85"/>
    <rect x="28"  y="224" width="126" height="9" rx="1.5" fill="#0078d4" opacity=".7"/>
    <rect x="28"  y="238" width="104" height="9" rx="1.5" fill="#0078d4" opacity=".55"/>
    <rect x="28"  y="252" width="80"  height="9" rx="1.5" fill="#0078d4" opacity=".40"/>
    <rect x="28"  y="266" width="58"  height="9" rx="1.5" fill="#0078d4" opacity=".30"/>
  </g>
  <!-- Bar size labels -->
  <g font-family="monospace" font-size="7" fill="#50e6ff" opacity=".5">
    <text x="192" y="218">1.2 GB/d</text>
    <text x="160" y="232">0.9 GB/d</text>
    <text x="138" y="246">0.7 GB/d</text>
    <text x="114" y="260">0.5 GB/d</text>
    <text x="92"  y="274">0.3 GB/d</text>
  </g>

  <!-- ── Right panel — KPI tiles ── -->
  <rect x="258" y="48" width="126" height="55" rx="4" fill="#0c1830" opacity=".8"/>
  <text x="272" y="64"  font-family="monospace" font-size="7"  fill="#50e6ff" opacity=".6">SITES TRACKED</text>
  <text x="272" y="86"  font-family="monospace" font-size="22" fill="#ffffff" font-weight="bold" opacity=".9">347</text>

  <rect x="258" y="112" width="126" height="55" rx="4" fill="#0c1830" opacity=".8"/>
  <text x="272" y="128" font-family="monospace" font-size="7"  fill="#50e6ff" opacity=".6">ANOMALIES 7D</text>
  <text x="272" y="150" font-family="monospace" font-size="22" fill="#ff6b6b" font-weight="bold" opacity=".9">3</text>

  <rect x="258" y="176" width="126" height="55" rx="4" fill="#0c1830" opacity=".8"/>
  <text x="272" y="192" font-family="monospace" font-size="7"  fill="#50e6ff" opacity=".6">TOTAL USED</text>
  <text x="272" y="214" font-family="monospace" font-size="18" fill="#57e39e" font-weight="bold" opacity=".9">3.8 TB</text>

  <rect x="258" y="240" width="126" height="40" rx="4" fill="#0c1830" opacity=".8"/>
  <text x="272" y="255" font-family="monospace" font-size="7"  fill="#50e6ff" opacity=".6">LAST RUN</text>
  <text x="272" y="272" font-family="monospace" font-size="9"  fill="#ffffff"  opacity=".7">Today 03:00 CET ✓</text>
</svg>
